name: Refresh swim times
on:
  schedule:
    - cron: '30 11 * * *'   # daily ~07:30 ET; keeps the site's PBs current
  workflow_dispatch: {}       # manual "Run workflow" button
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Regenerate swim-data.js
        run: python3 refresh_data.py
      - name: Commit if changed
        run: |
          git config user.name "swim-refresh-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain swim-data.js)" ]; then
            git add swim-data.js
            git commit -m "Auto-refresh times $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No change in times."
          fi
